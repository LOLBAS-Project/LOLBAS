---
Name: scp.exe
Description: Used for uploading or downloading files over ssh server.
Author: Kush Jasrapuria
Created: 2026-06-03
Commands:
  - Command: scp {username@domain}:{Remote file path} {Path where file will be saved}
    Description: Recieve the specified file from the specified host.
    Usecase: Download file from Internet
    Category: Download
    Privileges: User
    MitreID: T1105
    OperatingSystem: Windows 10, Windows 11
  - Command: scp {File path} {username@domain}:{Remote path where file will be saved}
    Description: Send the specified file to the specified host.
    Usecase: Upload
    Category: Upload
    Privileges: User
    MitreID: T1105
    OperatingSystem: Windows 10, Windows 11
Full_Path:
  - Path: C:\Windows\System32\OpenSSH\scp.exe
Detection:
  - IOC: New files created by scp.exe
Resources:
  - Link: https://gtfobins.org/gtfobins/scp/
Acknowledgement:
  - Person: Kush Jasrapuria
