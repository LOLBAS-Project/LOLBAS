---
Name: Eventcreate.exe
Description: >
  Eventcreate.exe is a native Windows command-line utility for creating
  custom entries in the Windows Event Log. It can be abused as a covert
  data staging and C2 instruction channel by embedding base64-encoded
  payloads in the event description field (/D). A resident implant polls
  the log via Get-WinEvent to retrieve and decode instructions. The write
  side requires no files dropped, no network connections, and runs at user
  privilege. Unregistered source names cause Windows Event Viewer to render
  a misleading description not found message, obscuring the payload from
  casual log inspection while the raw data remains fully recoverable.

Author: Nguyen Khanh Son, Barbara Carminati, Elena Ferrari
Created: 2026-05-30

Commands:
  - Command: eventcreate.exe /L Application /SO "svc-health" /ID 420 /T INFORMATION /D "aGVsbG8gd29ybGQ="
    Description: >
      Write a base64-encoded payload into the Application Event Log under
      a spoofed source name. /ID is mandatory (valid range 1-1000).
      A resident implant polls the log via Get-WinEvent filtering on
      ProviderName and EventID to retrieve and decode instructions.
      No files dropped, no network connections from the implant.
    Usecase: Covert payload staging and C2 channel via Windows Event Log
    Category: Execute
    Privileges: User
    MitreID: T1027
    OperatingSystem: Windows 10, Windows 11
    Tags:
      - Execute: EventLog
      - Stage: Base64

  - Command: eventcreate.exe /S <target> /U <domain\user> /P <password> /L Application /SO "svc-health" /ID 420 /T INFORMATION /D "aGVsbG8gd29ybGQ="
    Description: >
      Write encoded payload to a remote system Event Log without dropping
      any files on the remote host. Requires domain user credentials with
      write access to the remote Application log.
    Usecase: Remote covert payload staging without lateral file transfer
    Category: Execute
    Privileges: Domain User
    MitreID: T1021
    OperatingSystem: Windows 10, Windows 11
    Tags:
      - Execute: Remote
      - Stage: Base64

  - Command: eventcreate.exe /L Application /SO "svc-health" /ID 420 /T INFORMATION /D "aGVsbG8gd29ybGQ="
    Description: >
      Implant-side retrieval and execution via PowerShell. Polls Application
      log for entries from the attacker-controlled source name and Event ID,
      decodes the base64 payload from the Message field, and executes it.
      No network connection required. Instruction channel is the local
      Event Log.
    Usecase: Execute staged payload retrieved from Event Log C2 channel
    Category: Execute
    Privileges: User
    MitreID: T1059.001
    OperatingSystem: Windows 10, Windows 11
    Tags:
      - Execute: PowerShell
      - Stage: EventLog

  - Command: Clear-EventLog -LogName Application
    Description: >
      Remove all Application log entries after payload retrieval to eliminate
      forensic evidence of the staged payload. Requires user-level access
      to the Application log.
    Usecase: Cleanup staged payload entries from Event Log
    Category: Execute
    Privileges: User
    MitreID: T1070.001
    OperatingSystem: Windows 10, Windows 11
    Tags:
      - Execute: Cleanup

Full_Path:
  - Path: C:\Windows\System32\eventcreate.exe
  - Path: C:\Windows\SysWOW64\eventcreate.exe

Detection:
  - IOC: eventcreate.exe spawning with /D argument containing base64 pattern. Sysmon EID 1 Image=eventcreate.exe CommandLine matches /D with high-entropy string.
  - IOC: Application log entry from unregistered or unknown source name not in approved baseline. Unregistered source combined with rendering error is high-fidelity indicator.
  - IOC: PowerShell Script Block EID 4104 containing Get-WinEvent and Invoke-Expression in same block indicating Event Log polling combined with dynamic execution.
  - IOC: eventcreate.exe /S targeting remote systems from non-admin workstations. Sysmon EID 1 CommandLine containing /S followed by hostname or IP.

